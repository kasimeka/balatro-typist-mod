[manifest]
version = "1.0.0"
priority = 0

[[patches]]
[patches.pattern]
target = "engine/controller.lua"
position = "before"
times = 1
pattern = "function Controller:key_hold_update(key, dt)"
payload = '''
local __typist_key_press_update_impl = Controller.key_press_update
local __typist_layout = require("typist.mod.layout")
function Controller:key_press_update(key, dt)
  if
    key == __typist_layout.escape
    and require("typist.mod.run-setup").disable_and_unfocus_seed_input()
  then
    return
  end

  if _RELEASE_MODE then
    -- only hijack the escape key if it overlaps with typist's escape keybind
    -- allow its vanilla behaviour if typist's esc is overridden to sth else
    if not (key == "escape" and key == __typist_layout.escape) then
      __typist_key_press_update_impl(self, key, dt)
    end
    require("typist")(self, key, dt)
  elseif
    self.text_input_hook
    or self.held_keys[__typist_layout.debug_leader_left]
    or self.held_keys[__typist_layout.debug_leader_right]
  then
    __typist_key_press_update_impl(self, key, dt)
  else
    require("typist")(self, key, dt)
  end
end
'''
match_indent = true
